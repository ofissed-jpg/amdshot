<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Счетчик слов AmdShot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="logo">AmdShot</div>
    
    <div class="subscription-modal" id="subscriptionModal">
        <div class="modal-content">
            <h2>Приветствую!</h2>
            <p>Для использования счетчика слов подпишитесь на наш Telegram канал</p>
            <a href="https://t.me/amdshot" target="_blank" class="btn btn-primary modal-btn" id="subscribeBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.03-1.99 1.27-5.62 3.72-.53.36-1.01.54-1.44.53-.47-.01-1.38-.27-2.06-.49-.83-.27-1.49-.42-1.43-.88.03-.24.37-.49 1.02-.74 4-1.74 6.68-2.88 8.03-3.44 3.82-1.59 4.61-1.87 5.13-1.87.11 0 .37.03.53.17.14.11.17.26.19.37.01.08.03.29.01.45z"/>
                </svg>
                Перейти в канал
            </a>
            <button class="btn btn-secondary modal-btn" id="continueBtn">Продолжить</button>
        </div>
    </div>
    
    <div class="container">
        <div class="editor-card">
            <div id="textInput" class="text-editor" contenteditable="true"></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="charCount">0</div>
                <div class="stat-label">Символов</div>
            </div>

            <div class="stat-card">
                <div class="stat-value" id="charNoSpaceCount">0</div>
                <div class="stat-label">Без пробелов</div>
            </div>

            <div class="stat-card highlight">
                <div class="stat-value" id="wordCount">0</div>
                <div class="stat-label">Слов</div>
            </div>

            <div class="stat-card">
                <div class="stat-value" id="sentenceCount">0</div>
                <div class="stat-label">Предложений</div>
            </div>

            <div class="stat-card">
                <div class="stat-value" id="paragraphCount">0</div>
                <div class="stat-label">Абзацев</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" id="analyzeBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
            </button>
            <button class="btn btn-secondary" id="highlightBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 7V4h16v3M9 20h6M12 4v16"></path>
                </svg>
            </button>
            <button class="btn btn-secondary" id="clearBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 6h18"></path>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
                    <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
            </button>
        </div>
    </div>


    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Анализ повторов</h2>
            <button class="close-btn" id="closeSidebar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="filter-section">
            <label for="minRepeat">Минимум повторов:</label>
            <input type="number" id="minRepeat" min="2" value="2" />
        </div>
        <div class="filter-section">
            <label for="minWordLength">Количество слов в фразе:</label>
            <input type="number" id="minWordLength" min="1" value="1" />
        </div>
        <div class="sidebar-content" id="sidebarContent">
            <p class="empty-message">Введите текст для анализа повторяющихся слов</p>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <script src="script.js"></script>
</body>
</html>
